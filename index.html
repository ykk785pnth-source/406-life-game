<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'><title>406 Life</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#111;color:white;font-family:system-ui}canvas{width:100vw;height:100vh;touch-action:none}.ui{position:fixed;inset:0;pointer-events:none}.obj{position:absolute;top:16px;left:16px;background:#18120ddd;padding:12px 15px;border-radius:14px}.prompt{position:absolute;left:50%;bottom:24%;transform:translateX(-50%);background:#18120eee;padding:12px 16px;border-radius:14px;font-weight:800;opacity:0}.joy{position:absolute;left:24px;bottom:24px;width:120px;height:120px;border-radius:50%;background:#fff2;border:2px solid #fff3;pointer-events:auto;touch-action:none}.stick{position:absolute;left:33px;top:33px;width:54px;height:54px;border-radius:50%;background:#fff6}.act{position:absolute;right:28px;bottom:35px;width:100px;height:100px;border-radius:50%;border:2px solid #f5b36c;background:#b8652ddd;color:#fff;font-weight:900;pointer-events:auto}.dlg{display:none;position:absolute;left:50%;bottom:20px;transform:translateX(-50%);width:min(820px,92vw);background:#1b1512f5;border:1px solid #fff3;border-radius:20px;padding:17px;pointer-events:auto}.sp{color:#f4aa61;font-size:12px;font-weight:900;letter-spacing:.12em}.txt{font-size:18px;line-height:1.45;margin:6px 0 12px}.choices{display:grid;gap:8px}.choices button{background:#33241c;color:#fff;border:1px solid #fff2;border-radius:12px;padding:12px;text-align:left;font-weight:750}.title{position:fixed;inset:0;background:radial-gradient(circle at 70% 25%,#4a3224,#15110e 58%);display:flex;align-items:center;justify-content:center;z-index:4}.card{text-align:center;width:min(720px,90vw)}h1{font-size:clamp(72px,15vw,150px);line-height:.8;margin:12px 0;letter-spacing:-.07em}h1 span{color:#efa05a}.start{border:0;border-radius:15px;padding:15px 24px;background:linear-gradient(#ffc17e,#df7d35);font-size:18px;font-weight:950}.c ><option value='#80502f'>Brown</option><option value='#c99855'>Blonde</option><option value='#a94f37'>Copper</option></select></label></div><button id='done' class='done'>HEAD TO CRAGGY</button></div></div><script>
const c=document.getElementById('g'),ctx=c.getContext('2d');let W,H,dpr;function rs(){dpr=Math.min(devicePixelRatio,2);W=innerWidth;H=innerHeight;c.width=W*dpr;c.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',rs);rs();const world={w:1900,h:1250};let cam={x:0,y:0},keys={},joy={x:0,y:0},stage=0,dialogue=false,following=false;let p={x:950,y:100,r:16,speed:220,name:'Alex',skin:'#d99a70',hair:'#2b1a13'},host={x:900,y:350},tuff={x:430,y:620,target:null};const solids=[{x:600,y:420,w:700,h:350},{x:1360,y:390,w:120,h:650},{x:650,y:255,w:600,h:55}];addEventListener('keydown',e=>keys[e.key.toLowerCase()]=1);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);const je=document.getElementById('joy'),st=document.getElementById('stick');function jm(e){let r=je.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,m=Math.hypot(dx,dy),l=38;if(m>l){dx*=l/m;dy*=l/m}joy={x:dx/l,y:dy/l};st.style.transform=`translate(${dx}px,${dy}px)`}je.onpointerdown=e=>{je.setPointerCapture(e.pointerId);jm(e)};je.onpointermove=e=>{if(e.buttons)jm(e)};je.onpointerup=()=>{joy={x:0,y:0};st.style.transform=''};start.onclick=()=>{title.style.display='none';create.style.display='flex'};done.onclick=()=>{p.name=nm.value||'Alex';p.skin=sk.value;p.hair=hr.value;create.style.display='none'};function near(a,b,d=85){return Math.hypot(a.x-b.x,a.y-b.y)<d}function obj(s){objective.textContent='Objective: '+s}function say(s,t,cs){dialogue=true;dlg.style.display='block';sp.textContent=s;txt.textContent=t;choices.innerHTML='';cs.forEach(q=>{let b=document.createElement('button');b.textContent=q[0];b.onclick=()=>{dlg.style.display='none';dialogue=false;q[1]&&q[1]()};choices.appendChild(b)})}function interact(){if(dialogue)return;if(stage===0&&p.y>220){stage=1;obj('Turn in your application at the host stand');say('NARRATOR','Warm wood, TVs everywhere, the kitchen pass clattering. You made it inside Craggy Range.',[['Find the host stand']]);return}if(stage===1&&n t?1:0)-(keys.a||keys.arrowleft?1:0)+joy.x,dy=(keys.s||keys.arrowdown?1:0)-(keys.w||keys.arrowup?1:0)+joy.y,m=Math.hypot(dx,dy);if(m>1){dx/=m;dy/=m}let nx=p.x+dx*p.speed*dt,ny=p.y+dy*p.speed*dt;if(!col(nx,p.y))p.x=nx;if(!col(p.x,ny))p.y=ny}if(following){let dx=tuff.target.x-tuff.x,dy=tuff.target.y-tuff.y,m=Math.hypot(dx,dy);if(m>8){tuff.x+=dx/m*130*dt;tuff.y+=dy/m*130*dt}else{following=false;stage=4;obj('Sit with Tuff at the last booth')}}cam.x+=(p.x-W/2-cam.x)*Math.min(1,dt*5);cam.y+=(p.y-H/2-cam.y)*Math.min(1,dt*5);cam.x=Math.max(0,Math.min(world.w-W,cam.x));cam.y=Math.max(0,Math.min(world.h-H,cam.y));let s='';if(stage===1&&near(p,host))s='INTERACT · Turn in application';if(stage===2&&near(p,tuff))s='INTERACT · Talk to Tuff';if(stage===4&&near(p,tuff,110))s='INTERACT · Begin interview';prompt.textContent=s;prompt.style.opacity=s?1:0}function R(x,y,w,h,col,r=7){ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(x-cam.x,y-cam.y,w,h,r);ctx.fill()}function L(t,x,y,col='#fff',sz=13){ctx.fillStyle=col;ctx.font=`800 ${sz}px system-ui`;ctx.textAlign='center';ctx.fillText(t,x-cam.x,y-cam.y)}function table(x,y){R(x-34,y-23,68,46,'#714c34');[[x-48,y],[x+48,y],[x,y-36],[x,y+36]].forEach(a=>{ctx.fillStyle='#29231f';ctx.beginPath();ctx.arc(a[0]-cam.x,a[1]-cam.y,10,0,7);ctx.fill()})}function person(n,col){ctx.fillStyle='#0005';ctx.beginPath();ctx.ellipse(n.x-cam.x,n.y-cam.y+19,18,7,0,0,7);ctx.fill();R(n.x-14,n.y-7,28,34,col,8);ctx.fillStyle=n.skin||'#d49a72';ctx.beginPath();ctx.arc(n.x-cam.x,n.y-17-cam.y,12,0,7);ctx.fill();ctx.fillStyle=n.hair||'#382319';ctx.beginPath();ctx.arc(n.x-cam.x,n.y-22-cam.y,12,Math.PI,0);ctx.fill()}function draw(){ctx.fillStyle='#252a29';ctx.fillRect(0,0,W,H);R(0,0,1900,190,'#4b4d4e',0);R(40,190,1820,1010,'#987453',0);R(80,195,540,24,'#91c3d3',0);R(1280,195,540,24,'#91c3d3',0);L('GARAGE WINDOWS',350,240,'#eaf8fa');L('GARAGE WINDOWS',1550,240,'#eaf8fa');R(875,185,150,55,'#3d2a20',0);L('ENTRANCE',950,220,'#f2c58d');R(650,255,600,55,'#3b3028',0);R(780,262,340,38,'#c8d0c6',0);R(665,260,80,45,'#241d19',0);R(1155,260,80,45,'#241d19',0);L('KITCHEN PASS',950,287,'#4a392d');R(600,420,700,350,'#3a281f',18);R(635,455,630,280,'#6d432e',12);R(690,495,520,200,'#29211d',10);L('CENTER BAR',950,605,'#f0c08b',22);for(let xx=650;xx<1260;xx+=70){ctx.fillStyle='#94372e';ctx.beginPath();ctx.arc(xx-cam.x,402-cam.y,12,0,7);ctx.fill()}[[330,300],[460,300],[580,330],[300,430],[430,460],[300,570],[430,600],[300,710],[430,730],[1450,310],[1610,310],[1450,470],[1610,470],[1450,630],[1610,630],[320,830],[460,830],[590,850],[320,1000],[460,1000],[590,1020]].forEach(a=>table(...a));for(let y=420;y<1050;y+=90){R(1480,y,220,62,'#65372e',12);R(1495,y+10,190,42,'#82483c',10)}L('7 BOOTHS',1590,390,'#f4d1a8');R(40,700,60,190,'#20201e',0);L('PATIO EXIT',150,790,'#fff');R(115,610,210,80,'#302821');L('406',220,664,'#ffb45f',42);R(850,320,100,55,'#5a3d2a');L('HOST',900,353,'#f7d7b0');L('🏒  HOCKEY JERSEY',1740,760,'#d8c08e',15);L('⛷  SKI PHOTO',1740,830,'#d8c08e',15);[[1080,340],[520,350],[1390,780],[740,830],[1180,920]].forEach((a,i)=>person({x:a[0],y:a[1]},['#536f5d','#76515d','#4c657b'][i%3]));person(host,'#8b5c45');L('HOST',host.x,host.y-38);person(tuff,'#5c765a');L('TUFF',tuff.x,tuff.y-38,'#f3bd7e');person(p,'#3f607f');L(p.name,p.x,p.y-40)}let last=performance.now();function loop(n){let dt=Math.min(.033,(n-last)/1000);last=n;upd(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
